<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>搜索结果页</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; background:#C8D0E0; padding:24px;
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
}

.phone {
  width:390px; height:844px; background:#fff;
  border-radius:48px; overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.35), 0 0 0 8px #111;
  display:flex; flex-direction:column;
}

.phone-content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.phone-content::-webkit-scrollbar { display:none; }

/* 状态栏 */
.status-bar {
  height:44px; display:flex; align-items:center;
  justify-content:space-between; padding:0 24px;
}
.status-time { font-size:15px; font-weight:700; color:#1A2C5B; }
.status-icons { display:flex; gap:6px; color:#1A2C5B; font-size:13px; }

/* 导航栏 */
.nav-bar {
  height:44px; display:flex; align-items:center;
  justify-content:space-between; padding:0 20px;
}
.nav-back {
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:#1A2C5B; cursor:pointer;
}
.nav-right { display:flex; align-items:center; gap:12px; }
.nav-dots { font-size:18px; color:#1A2C5B; letter-spacing:2px; cursor:pointer; }
.nav-circle {
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid #1A2C5B;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.nav-circle-inner { width:10px; height:10px; border-radius:50%; border:1.5px solid #1A2C5B; }

/* 搜索框 */
.search-wrap { padding:8px 20px 0; }
.search-input-row {
  background:#F2F4F8; border-radius:24px; height:44px;
  display:flex; align-items:center; padding:0 16px; gap:8px;
}
.search-input {
  flex:1; border:none; background:transparent;
  font-size:15px; color:#1A2C5B; outline:none;
}
.search-input::placeholder { color:#AABBCC; }
.search-btn {
  font-size:14px; font-weight:600; color:#2B7FFF;
  cursor:pointer; padding:0 4px; white-space:nowrap;
}

/* 已选筛选标签条（只读） */
.active-filters {
  display:none;
  flex-wrap:wrap;
  align-items:center;
  gap:6px;
  padding:10px 20px 10px;
  border-bottom:1px solid #F2F4F8;
}
.active-filters.visible { display:flex; }

.filter-tag {
  display:inline-flex; align-items:center; gap:4px;
  background:#EEF4FF; border:1px solid #C8DCFF;
  border-radius:20px; padding:3px 10px;
  font-size:12px; color:#2B7FFF; font-weight:500;
}

.modify-btn {
  font-size:12px; color:#AABBCC;
  cursor:pointer; text-decoration:underline;
  white-space:nowrap; margin-left:4px;
}

/* 政策列表 */
.policy-list { background:#fff; }

.policy-item {
  display:flex; align-items:stretch;
  padding:16px 20px; border-bottom:1px solid #F2F4F8;
  cursor:pointer; gap:14px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.policy-item:last-child { border-bottom:none; }

.policy-left {
  flex:1; display:flex; flex-direction:column;
  justify-content:space-between; gap:10px;
}

.policy-title {
  font-size:16px; font-weight:600; color:#1A2C5B; line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.policy-title .highlight { color:#2B7FFF; }

.policy-meta {
  display:flex; align-items:center; gap:6px; flex-wrap:nowrap;
}

.policy-tag {
  background:#EEF4FF; color:#2B7FFF;
  font-size:10px; font-weight:500;
  padding:2px 8px; border-radius:20px;
  border:1px solid #C8DCFF; white-space:nowrap;
}

.policy-subtag {
  background:#FFF4E8; color:#FF7A20;
  font-size:10px; font-weight:500;
  padding:2px 8px; border-radius:20px;
  border:1px solid #FFD0A0; white-space:nowrap;
}

/* 右侧学校卡片 */
.school-card {
  width:110px; flex-shrink:0; border-radius:14px;
  background:linear-gradient(145deg, #5BA8FF, #3380EE);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:10px 8px;
  position:relative; overflow:hidden; min-height:80px;
}
.school-card::before {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(160deg, rgba(255,255,255,0.15) 0%, transparent 60%);
}
.school-card-dots { display:flex; gap:4px; position:absolute; top:8px; right:10px; }
.school-card-dot { width:6px; height:6px; border-radius:50%; }
.dot-red { background:#FF6B6B; }
.dot-yellow { background:#FFD060; }
.dot-green { background:#60CC80; }
.school-card-views {
  position:absolute; top:8px; left:8px;
  font-size:8px; color:rgba(255,255,255,0.95);
  display:flex; align-items:center; gap:2px;
  z-index:1; white-space:nowrap;
  background:rgba(0,0,0,0.15);
  padding:2px 5px; border-radius:8px;
}
.school-name {
  font-size:14px; font-weight:700; color:#fff;
  text-align:center; line-height:1.4; margin-top:14px;
  position:relative; z-index:1;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

/* 空状态 */
.empty-state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 20px;
}
.empty-state img { width:220px; height:auto; }

/* Home bar */
.home-bar {
  height:34px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.home-bar-line {
  width:120px; height:4px;
  background:#1A2C5B; border-radius:2px; opacity:0.15;
}
</style>
</head>
<body>
<div class="phone">
  <!-- 固定头部 -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons"><span>▐▐▐</span><span>●</span><span>🔋</span></div>
  </div>

  <div class="nav-bar">
    <div class="nav-back" id="navBack">＜</div>
    <div class="nav-right">
      <span class="nav-dots">•••</span>
      <div class="nav-circle"><div class="nav-circle-inner"></div></div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-input-row">
      <input class="search-input" type="text" id="searchInput" placeholder="输入学校名称" />
      <span class="search-btn" onclick="doSearch()">搜索</span>
    </div>
  </div>

  <!-- 可滚动内容 -->
  <div class="phone-content">
    <!-- 已选筛选标签（只读） -->
    <div class="active-filters" id="activeFilters"></div>

    <!-- 结果列表 -->
    <div class="policy-list" id="resultList"></div>
  </div>

  <div class="home-bar"><div class="home-bar-line"></div></div>
</div>

<script>
// 全部政策数据
const allPolicies = [
  { title:'2025年北京市第十九中学科技特长生招生公告', tag:'高中', subtag:'强基计划', subtag2:'自主招生', year:'2025', views:3, school:'北京一七一中学', region:'北京' },
  { title:'2025年上海市七宝中学信息学特长生招生简章', tag:'高中', subtag:'科技特长生', year:'2025', views:1, school:'七宝中学', region:'上海' },
  { title:'2024年北京市第十九中学科技特长生政策', tag:'高中', subtag:'强基计划', year:'2024', views:8, school:'四川外国语大学重庆科学城中学校', region:'北京' },
  { title:'2024年北京市第十九中学', tag:'高中', subtag:'科技特长生', year:'2024', views:5, school:'东直门中学', region:'北京' },
  { title:'2024年广州市执信中学特长生招生政策', tag:'高中', subtag:'强基计划', year:'2024', views:2, school:'执信中学', region:'广东' },
  { title:'2024年上海市实验学校科技特长生招生方案', tag:'高中', subtag:'科技特长生', year:'2024', views:7310, school:'上海实验学校', region:'上海' },
  { title:'2024年深圳市南山外国语学校信息特长生简章', tag:'初中', subtag:'科技特长生', year:'2024', views:5230, school:'南山外国语学校', region:'广东' },
  { title:'2024年成都石室中学科技特长生招生政策', tag:'高中', subtag:'科技特长生', year:'2024', views:4120, school:'石室中学', region:'四川' },
  { title:'2024年杭州学军中学信息特长生招生', tag:'高中', subtag:'强基计划', year:'2024', views:3545, school:'学军中学', region:'浙江' },
  { title:'2023年广东省实验中学科技特长生招生', tag:'高中', subtag:'科技特长生', year:'2023', views:2200, school:'广东省实验中学', region:'广东' },
  { title:'2024年武汉市第二中学科技特长生招生简章', tag:'高中', subtag:'科技特长生', year:'2024', views:680, school:'武汉第二中学', region:'湖北' },
  { title:'2023年西安交大附中信息学特长生政策', tag:'高中', subtag:'强基计划', year:'2023', views:420, school:'西安交大附中', region:'陕西' },
  { title:'2022年南京市金陵中学信息学招生简章', tag:'高中', subtag:'强基计划', year:'2022', views:1580, school:'金陵中学', region:'江苏' },
  { title:'2024年成都小学信息学特长生招生简章', tag:'小学', year:'2024', views:95, school:'成都实验小学', region:'四川' },
  { title:'2023年上海市小学编程特长生招生政策', tag:'小学', year:'2023', views:760, school:'上海实验小学', region:'上海' },
];

function getParams() {
  const p = new URLSearchParams(location.search);
  const split = key => (p.get(key) || '').split(',').filter(Boolean);
  return {
    q:          p.get('q') || '',
    years:      split('years'),
    types:      split('types'),
    categories: split('categories'),
    regions:    split('regions'),
  };
}

function highlight(text, keyword) {
  if (!keyword) return text;
  const idx = text.toLowerCase().indexOf(keyword.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) +
    '<span class="highlight">' + text.slice(idx, idx + keyword.length) + '</span>' +
    text.slice(idx + keyword.length);
}

function renderResults() {
  const { q, years, types, categories, regions } = getParams();

  // 回填搜索词
  document.getElementById('searchInput').value = q;

  // 返回搜索页时带上当前参数（回填状态）
  document.getElementById('navBack').onclick = () => {
    location.href = 'preview_search.html?' + location.search.slice(1);
  };

  // 已选筛选标签（只读）
  const filtersEl = document.getElementById('activeFilters');
  const allTags = [
    ...years.map(v => v + '年'),
    ...types.map(v => v),
    ...categories.map(v => v),
    ...regions.map(v => v),
  ];

  if (allTags.length) {
    filtersEl.classList.add('visible');
    filtersEl.innerHTML = allTags.map(label =>
      `<span class="filter-tag">${label}</span>`
    ).join('') +
    `<span class="modify-btn" onclick="goModify()">修改筛选</span>`;
  } else {
    filtersEl.classList.remove('visible');
  }

  // 筛选数据
  let results = allPolicies.filter(item => {
    const matchQ        = !q             || item.title.toLowerCase().includes(q.toLowerCase()) || item.school.toLowerCase().includes(q.toLowerCase());
    const matchYear     = !years.length  || years.includes(item.year);
    const matchType     = !types.length  || types.includes(item.tag);
    const matchCat      = !categories.length || (item.subtag && categories.includes(item.subtag)) || (item.subtag2 && categories.includes(item.subtag2));
    const matchRegion   = !regions.length || regions.includes(item.region);
    return matchQ && matchYear && matchType && matchCat && matchRegion;
  });

  const list = document.getElementById('resultList');
  list.innerHTML = '';

  if (results.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <img src="saokao-miniapp/images/empty-search.png" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <div style="display:none; font-size:64px; margin-bottom:16px;">🔍</div>
      </div>`;
    return;
  }

  results.forEach(item => {
    const el = document.createElement('div');
    el.className = 'policy-item';
    el.onclick = () => location.href = `preview_detail.html?title=${encodeURIComponent(item.title)}`;
    el.innerHTML = `
      <div class="policy-left">
        <div class="policy-title">${highlight(item.title, q)}</div>
        <div class="policy-meta">
          <span class="policy-tag">${item.tag}</span>
          ${item.subtag ? `<span class="policy-subtag">${item.subtag}</span>` : ''}
          ${item.subtag2 ? `<span class="policy-subtag">${item.subtag2}</span>` : ''}
        </div>
      </div>
      <div class="school-card">
        ${item.views >= 1000 ? `<div class="school-card-views"><svg width="9" height="9" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="8" r="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg> ${(item.views / 1000).toFixed(1).replace(/\.0$/, '') + 'k'}</div>` : ''}
        <div class="school-card-dots">
          <div class="school-card-dot dot-red"></div>
          <div class="school-card-dot dot-yellow"></div>
          <div class="school-card-dot dot-green"></div>
        </div>
        <div class="school-name">${item.school}</div>
      </div>`;
    list.appendChild(el);
  });
}

function goModify() {
  // 返回搜索页并回填筛选状态
  location.href = 'preview_search.html?' + location.search.slice(1);
}

function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  const { years, types, categories, regions } = getParams();
  const params = new URLSearchParams();
  if (keyword)          params.set('q',          keyword);
  if (years.length)     params.set('years',      years.join(','));
  if (types.length)     params.set('types',      types.join(','));
  if (categories.length) params.set('categories', categories.join(','));
  if (regions.length)   params.set('regions',    regions.join(','));
  location.href = 'preview_search_result.html?' + params.toString();
}

document.addEventListener('DOMContentLoaded', renderResults);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
