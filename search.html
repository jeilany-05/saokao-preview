<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>搜索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d8e8;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 0 40px;
  }

  .phone-shell {
    width: 375px;
    height: 812px;
    border-radius: 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 8px #c8d0e0, 0 0 0 10px #b8c2d6;
    overflow: hidden;
    position: relative;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  /* 状态栏 */
  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 0;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .status-icons { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #1a1a2e; }

  /* 导航栏 */
  .nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .back-btn { font-size: 22px; color: #333; cursor: pointer; font-weight: 300; line-height: 1; }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-dots { font-size: 18px; color: #333; letter-spacing: 2px; cursor: pointer; font-weight: 600; }
  .nav-scan {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .nav-scan::after {
    content: '';
    width: 7px; height: 7px;
    background: #333;
    border-radius: 50%;
  }

  /* 搜索框 */
  .search-area {
    padding: 10px 16px 12px;
    flex-shrink: 0;
  }
  .search-input-wrap {
    display: flex;
    align-items: center;
    border: 2px solid #2563eb;
    border-radius: 24px;
    padding: 9px 16px;
    background: #fff;
  }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    color: #333;
    background: transparent;
    font-family: inherit;
  }
  .search-input::placeholder { color: #c0cad8; }
  .search-submit {
    font-size: 15px;
    color: #f59e0b;
    font-weight: 600;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    margin-left: 8px;
    flex-shrink: 0;
    font-family: inherit;
  }

  /* 历史记录区 */
  .history-area {
    flex: 1;
    background: #fff;
    padding: 16px 16px 0;
    overflow-y: auto;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-title {
    font-size: 14px;
    color: #999;
    font-weight: 500;
  }
  .history-clear {
    font-size: 13px;
    color: #999;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
  }
  .history-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .history-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: #f4f6fa;
    border-radius: 16px;
    font-size: 13px;
    color: #444;
    cursor: pointer;
  }
  .history-tag:active { background: #e8ecf4; }
  .history-empty { display: none; }

  /* ── iOS 键盘 ── */
  .keyboard {
    flex-shrink: 0;
    background: #d1d3d9;
  }

  /* 候选词条 */
  .kb-suggestions {
    display: flex;
    align-items: center;
    height: 44px;
    background: #cdd0d6;
    border-top: 1px solid #b5b8be;
    border-bottom: 1px solid #b5b8be;
  }
  .kb-sug-item {
    flex: 1;
    text-align: center;
    font-size: 15px;
    color: #000;
    padding: 4px 0;
    position: relative;
  }
  .kb-sug-item + .kb-sug-item::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: #b0b3b9;
  }
  .kb-chevron {
    width: 36px;
    text-align: center;
    font-size: 14px;
    color: #555;
    flex-shrink: 0;
    border-left: 1px solid #b0b3b9;
  }

  /* 按键区域 */
  .kb-keys {
    padding: 6px 3px 2px;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 5px;
    padding: 0 3px;
  }
  .kb-key {
    flex: 1;
    height: 42px;
    background: #fff;
    border-radius: 5px;
    box-shadow: 0 1px 0 1px rgba(0,0,0,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: #000;
    cursor: pointer;
    user-select: none;
    letter-spacing: 0;
  }
  .kb-key.special {
    background: #adb5bd;
    font-size: 13px;
    color: #000;
  }
  .kb-key.space { flex: 5; font-size: 15px; }
  .kb-key.wide  { flex: 1.5; }
  .kb-key.wider { flex: 2; }

  /* 底部 Globe/Mic 行 */
  .kb-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 20px 8px;
  }
  .kb-icon { font-size: 22px; color: #555; }

  /* Home indicator */
  .kb-home {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #d1d3d9;
  }
  .kb-home-bar {
    width: 130px; height: 5px;
    background: #333;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="phone-shell">

  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons"><span>▐▐▐</span><span>📶</span><span>🔋</span></div>
  </div>

  <!-- 导航栏 -->
  <div class="nav-bar">
    <span class="back-btn" id="backBtn">＜</span>
    <div class="nav-right">
      <span class="nav-dots">···</span>
      <div class="nav-scan"></div>
    </div>
  </div>

  <!-- 搜索框 -->
  <div class="search-area">
    <div class="search-input-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="输入学校名称" autofocus>
      <button class="search-submit" id="searchBtn">搜索</button>
    </div>
  </div>

  <!-- 历史记录区 -->
  <div class="history-area" id="historyArea">
    <div class="history-header" id="historyHeader">
      <span class="history-title">搜索历史</span>
      <button class="history-clear" id="clearBtn">清空</button>
    </div>
    <div class="history-tags" id="historyTags"></div>
  </div>

  <!-- iOS 键盘 -->
  <div class="keyboard">
    <div class="kb-suggestions">
      <div class="kb-sug-item">是</div>
      <div class="kb-sug-item">我</div>
      <div class="kb-sug-item">好</div>
      <div class="kb-sug-item">笑</div>
      <div class="kb-sug-item">真的</div>
      <div class="kb-sug-item">嘻嘻</div>
      <div class="kb-sug-item">鸣鸣</div>
      <div class="kb-chevron">∨</div>
    </div>
    <div class="kb-keys">
      <div class="kb-row">
        <div class="kb-key">q</div><div class="kb-key">w</div><div class="kb-key">e</div>
        <div class="kb-key">r</div><div class="kb-key">t</div><div class="kb-key">y</div>
        <div class="kb-key">u</div><div class="kb-key">i</div><div class="kb-key">o</div>
        <div class="kb-key">p</div>
      </div>
      <div class="kb-row" style="padding:0 18px;">
        <div class="kb-key">a</div><div class="kb-key">s</div><div class="kb-key">d</div>
        <div class="kb-key">f</div><div class="kb-key">g</div><div class="kb-key">h</div>
        <div class="kb-key">j</div><div class="kb-key">k</div><div class="kb-key">l</div>
      </div>
      <div class="kb-row">
        <div class="kb-key special wide">⇧</div>
        <div class="kb-key">z</div><div class="kb-key">x</div><div class="kb-key">c</div>
        <div class="kb-key">v</div><div class="kb-key">b</div><div class="kb-key">n</div>
        <div class="kb-key">m</div>
        <div class="kb-key special wide">⌫</div>
      </div>
      <div class="kb-row">
        <div class="kb-key special wider">123</div>
        <div class="kb-key special">😊</div>
        <div class="kb-key space">空格</div>
        <div class="kb-key special wider">换行</div>
      </div>
    </div>
    <div class="kb-bottom">
      <span class="kb-icon">🌐</span>
      <span class="kb-icon">🎤</span>
    </div>
    <div class="kb-home"><div class="kb-home-bar"></div></div>
  </div>

</div>

<script>
  const HISTORY_KEY = 'search_history';
  const MAX_HISTORY = 10;

  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveHistory(list) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }

  function addHistory(q) {
    if (!q) return;
    let list = getHistory().filter(item => item !== q);
    list.unshift(q);
    if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
    saveHistory(list);
  }

  function renderHistory() {
    const list = getHistory();
    const header = document.getElementById('historyHeader');
    const tags = document.getElementById('historyTags');
    if (list.length === 0) {
      header.style.display = 'none';
      tags.innerHTML = '';
      return;
    }
    header.style.display = 'flex';
    tags.innerHTML = list.map(q =>
      `<span class="history-tag" data-q="${encodeURIComponent(q)}">${q}</span>`
    ).join('');
    tags.querySelectorAll('.history-tag').forEach(el => {
      el.addEventListener('click', () => {
        const q = decodeURIComponent(el.dataset.q);
        addHistory(q);
        window.location.href = `search_result.html?q=${encodeURIComponent(q)}`;
      });
    });
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'policy_list.html';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    saveHistory([]);
    renderHistory();
  });

  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    addHistory(q);
    window.location.href = `search_result.html?q=${encodeURIComponent(q)}`;
  }

  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  renderHistory();
</script>
</body>
</html>
